defaults:
  - hydra: default           # rich logging to terminal + file
  - backbone: resnet18
  - optimizer: adamw
  - scheduler: none          # swap to cosine, onecycle, or plateau to enable
  - dataloader: default      # swap to performance (GPU) or debug (num_workers=0)
  - trainer: default
  - logger: none             # swap to clearml (or other) to enable experiment tracking
  - callbacks: none          # swap to default (lr_monitor + ema + checkpoint) or minimal
  - transforms: default      # swap to augmented or your own transforms config
  - export: torchscript             # swap to torchscript, tensorrt, or all
  - _self_
  - experiment: null        # experiment overrides go last → highest priority

project: my-project
run_name: ${now:%Y-%m-%d}/${now:%H-%M-%S}
save_dir: ${hydra:run.dir}

seed: 42
epochs: 10
batch_size: 16
lr: 1.0e-3
image_size: [224, 224]
mean: [0.485, 0.456, 0.406]
std: [0.229, 0.224, 0.225]

run_train: true
run_test: true
run_export: true

data:
  sources: ???         # str/list → split mode; {train: ..., val: ...} → pre-split mode
  split: null


tasks: {}              # override in experiment config
