targets:
  - format: onnx
    opset_version: 17
    simplify: true

  - format: torchscript
    method: trace

  - format: tensorrt
    precision: fp16
    shapes:
      min: [1, 3, "${image_size.0}", "${image_size.1}"]
      opt: [4, 3, "${image_size.0}", "${image_size.1}"]
      max: [8, 3, "${image_size.0}", "${image_size.1}"]
