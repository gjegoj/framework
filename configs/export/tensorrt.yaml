# TensorRT export → serialized engine (.plan) in {save_dir}/export/.
# CUDA-only: the engine is hardware + TensorRT-version specific — build it on a node matching
# your deployment. Install the optional backend: `uv add --optional export-trt torch-tensorrt tensorrt`.
#
# `shapes` is the dynamic optimization profile for the image input. H/W reference the run's
# `image_size` so they are never hardcoded; the leading value is the batch (min/opt/max).
# Drop `shapes` to fall back to a batch-only 1/4/8 profile over the example input's own C,H,W.
# fp16 needs a looser parity tolerance than the framework default.
targets:
  - format: tensorrt
    precision: fp16
    atol: 1.0e-2
    rtol: 1.0e-2
    shapes:
      min: [1, 3, "${image_size.0}", "${image_size.1}"]
      opt: [4, 3, "${image_size.0}", "${image_size.1}"]
      max: [8, 3, "${image_size.0}", "${image_size.1}"]
