version: 1
formatters:
  simple:
    format: "[%(asctime)s][%(name)s] - %(message)s"
    datefmt: "%Y-%m-%d %H:%M:%S"

handlers:
  rich:
    class: rich.logging.RichHandler
    level: INFO
    formatter: simple
    rich_tracebacks: false
    show_time: false
    show_path: false
    markup: false

root:
  level: INFO
  handlers: [rich]

loggers:
  lightning:
    level: INFO
    handlers: [rich]
    propagate: false
  clearml:
    level: INFO
    handlers: [rich]
    propagate: false
  clearml.task:
    level: WARNING
    handlers: [rich]
    propagate: false
  clearml.binding:
    level: WARNING
    handlers: [rich]
    propagate: false
  # Pre-configured (non-empty handlers) so ClearML's "add my handler if none" check
  # skips it — otherwise its plain-format handler double-prints every resource-monitor line.
  clearml.resource_monitor:
    level: INFO
    handlers: [rich]
    propagate: false

disable_existing_loggers: false
