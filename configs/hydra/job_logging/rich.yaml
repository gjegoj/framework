version: 1
formatters:
  simple:
    format: "[%(asctime)s][%(name)s] - %(message)s"
    datefmt: "%Y-%m-%d %H:%M:%S"

handlers:
  rich:
    class: rich.logging.RichHandler
    level: INFO
    formatter: simple
    rich_tracebacks: false
    show_time: false
    show_path: false
    markup: false
  file:
    class: logging.FileHandler
    level: INFO
    formatter: simple
    filename: ${hydra.runtime.output_dir}/${hydra.job.name}.log

root:
  level: INFO
  handlers: [rich, file]

loggers:
  lightning:
    level: INFO
    handlers: [rich, file]
    propagate: false
  clearml:
    level: INFO
    handlers: [rich, file]
    propagate: false
  clearml.task:
    level: WARNING
    handlers: [rich, file]
    propagate: false
  clearml.binding:
    level: WARNING
    handlers: [rich, file]
    propagate: false

disable_existing_loggers: false
