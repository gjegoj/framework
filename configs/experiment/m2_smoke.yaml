# @package _global_
# M2 smoke: 4-task run (multiclass + binary + multilabel + regression) on CPU.
# Validates that all new objective axes wire end-to-end without code changes.

defaults:
  - override /trainer: cpu_smoke

project: smoke-m2
seed: 0
epochs: 2
batch_size: 4
image_size: [64, 64]

data:
  sources: data/smoke/data.csv
  inputs: image_path
  split:
    train: 0.7
    val: 0.15
    test: 0.15

tasks:
  label:
    preset: classification          # GLOBAL × multiclass (M1 baseline)
    target: label
    class_mapping: {0: cat, 1: cow, 2: dog}

  is_cat:
    preset: classification          # GLOBAL × binary
    target: binary_label
    objective: binary
    class_mapping: {0: "0", 1: "1"}

  tags:
    preset: classification          # GLOBAL × multilabel
    target: tags
    objective: multilabel
    class_mapping: {0: fluffy, 1: indoor, 2: large, 3: outdoor, 4: small}

  score:
    preset: regression              # GLOBAL × continuous (scalar)
    target: value
    dim: 1
