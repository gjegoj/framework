# @package _global_
defaults:
  - override /backbone: smp_unet
  - override /logger: clearml
  - override /callbacks: augmented
  - override /scheduler: onecycle
  - override /dataloader: debug

project: pet-multitask
seed: 0
epochs: 10
batch_size: 8
image_size: [128, 128]

run_train: true
run_test: true
run_export: false

callbacks:
  sample_log:
    num_images: 5
    every_n_epochs: 5
    batch_index: 0
    mean: ${mean}
    std: ${std}

data:
  sources: data/pet/data.csv
  inputs: image_path
  split_stratify: breed
  cache: {ram_fraction: 0.5}
  max_samples: 1000
  split:
    train: 0.7
    val: 0.2
    test: 0.1

tasks:
  # GLOBAL × binary — cat vs dog. smp has no pooled stream, so classify off the raw
  # encoder output (native smp ClassificationHead pools internally).
  # species:
  #   preset: classification
  #   objective: binary
  #   target: species
  #   class_mapping: {0: cat, 1: dog}
  #   feature_key: encoder_last
  #   optimizer:
  #     lr: 1.0e-4

  breed:
    preset: classification
    target: breed
    feature_key: encoder_last
    class_mapping:
      0: Abyssinian
      1: Bengal
      2: Birman
      3: Bombay
      4: British_Shorthair
      5: Egyptian_Mau
      6: Maine_Coon
      7: Persian
      8: Ragdoll
      9: Russian_Blue
      10: Siamese
      11: Sphynx
      12: american_bulldog
      13: american_pit_bull_terrier
      14: basset_hound
      15: beagle
      16: boxer
      17: chihuahua
      18: english_cocker_spaniel
      19: english_setter
      20: german_shorthaired
      21: great_pyrenees
      22: havanese
      23: japanese_chin
      24: keeshond
      25: leonberger
      26: miniature_pinscher
      27: newfoundland
      28: pomeranian
      29: pug
      30: saint_bernard
      31: samoyed
      32: scottish_terrier
      33: shiba_inu
      34: staffordshire_bull_terrier
      35: wheaten_terrier
      36: yorkshire_terrier

