# @package _global_
# KL-divergence distillation from one or more frozen teachers.
#
# Per task the training loss becomes ``hard + weight * soft`` where ``soft`` is the
# temperature-scaled KL between student logits and the teachers' averaged raw logits.
# Distillation runs on TRAIN only; validation/test losses stay pure task losses.
distillation:
  teachers:
    # One entry per teacher; raw logits are averaged across them. Each teacher's heads
    # are derived from the student's tasks, so logit shapes match by construction.
    - backbone: ${backbone}          # reuse the student backbone spec, or inline a different one
      ckpt_path: ???                  # path to the teacher .ckpt (EMA weights used when present)
  temperature: 2.0                    # softening temperature, injected into the DEFAULT kl_divergence loss only
  weight: 0.7                         # additive soft-loss weight (float, or {task_name: float})
  # loss: {name: kl_divergence, temperature: 4.0}   # explicit brick-spec: used AS IS, top-level temperature is
  #                                                  # ignored entirely (omit temperature here -> criterion default)
  # tasks: [mask]                                    # subset to distill; omit -> every task
